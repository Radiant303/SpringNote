name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  flutter-checks:
    name: Flutter Analyze & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: spring_note

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Release script tests
        working-directory: ${{ github.workspace }}
        run: python3 -m unittest discover .github/scripts/tests

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter analyze
        run: flutter analyze

      - name: Flutter test
        run: flutter test

      - name: Rust test
        working-directory: spring_note/rust
        run: cargo test

  windows-build:
    name: Windows Release Build
    runs-on: windows-latest
    needs: flutter-checks
    defaults:
      run:
        working-directory: spring_note

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Resolve Windows artifact metadata
        id: windows-artifact
        shell: pwsh
        run: |
          $pubspec = Get-Content -LiteralPath "pubspec.yaml" -Raw
          $versionMatch = [regex]::Match($pubspec, '(?m)^version:\s*([^\s+]+)')
          if (-not $versionMatch.Success) {
            throw "Unable to read the application version from pubspec.yaml."
          }

          $version = $versionMatch.Groups[1].Value
          "version=$version" >> $env:GITHUB_OUTPUT
          "asset_name=SpringNote-$version-windows-x64-setup.exe" >> $env:GITHUB_OUTPUT
          "artifact_name=SpringNote-$version-windows-x64-setup" >> $env:GITHUB_OUTPUT

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Package Windows installer
        shell: pwsh
        env:
          SPRINGNOTE_APP_VERSION: ${{ steps.windows-artifact.outputs.version }}
          SPRINGNOTE_BUILD_OUTPUT_DIR: ${{ github.workspace }}\spring_note\build\windows\x64\runner\Release
          SPRINGNOTE_SETUP_OUTPUT_DIR: ${{ github.workspace }}\spring_note\build\windows\installer
        run: |
          $isccCommand = Get-Command ISCC.exe -ErrorAction SilentlyContinue
          if ($null -ne $isccCommand) {
            $iscc = $isccCommand.Source
          } else {
            $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          }
          if (-not (Test-Path -LiteralPath $iscc)) {
            throw "Inno Setup compiler not found."
          }

          & $iscc "installer\springnote.iss"
          if ($LASTEXITCODE -ne 0) {
            throw "Inno Setup failed with exit code $LASTEXITCODE."
          }

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.windows-artifact.outputs.artifact_name }}
          path: spring_note/build/windows/installer/${{ steps.windows-artifact.outputs.asset_name }}
          if-no-files-found: error

  macos-build:
    name: macOS Release Build
    runs-on: macos-latest
    needs: flutter-checks
    defaults:
      run:
        working-directory: spring_note

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Flutter pub get
        run: flutter pub get

      - name: Prepare macOS native project
        run: flutter build macos --debug --config-only

      - name: Run macOS native tests
        run: >
          xcodebuild test
          -workspace macos/Runner.xcworkspace
          -scheme Runner
          -configuration Debug
          -destination 'platform=macOS'
          CODE_SIGNING_ALLOWED=NO

      - name: Build macOS release
        run: flutter build macos --release

      - name: Package macOS DMG
        id: package-macos
        shell: bash
        run: |
          set -euo pipefail

          version="$(awk '/^version:/{print $2}' pubspec.yaml | cut -d+ -f1)"
          arch="$(uname -m)"
          if [ "$arch" = "x86_64" ]; then
            arch="x64"
          fi

          app_name="SpringNote"
          artifact_name="${app_name}-${version}-macos-${arch}"
          release_dir="build/macos/Build/Products/Release"
          stage_dir="${release_dir}/${artifact_name}"
          dmg_path="${release_dir}/${artifact_name}.dmg"

          rm -rf "$stage_dir" "$dmg_path"
          mkdir -p "$stage_dir"
          ditto "${release_dir}/spring_note.app" "${stage_dir}/${app_name}.app"
          ln -s /Applications "${stage_dir}/Applications"

          hdiutil create \
            -volname "$app_name" \
            -srcfolder "$stage_dir" \
            -ov \
            -format UDZO \
            "$dmg_path"

          hdiutil verify "$dmg_path"
          echo "dmg_path=${dmg_path}" >> "$GITHUB_OUTPUT"
          echo "dmg_name=${artifact_name}" >> "$GITHUB_OUTPUT"

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package-macos.outputs.dmg_name }}
          path: spring_note/${{ steps.package-macos.outputs.dmg_path }}
          if-no-files-found: error
